name: Publish npm

# npm requires either 2FA on the publishing account or a token type that may publish
# without an OTP (e.g. Automation, or granular with publish + bypass 2FA as offered).
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Publish zerogpu-api
        working-directory: npm
        run: npm ci && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
